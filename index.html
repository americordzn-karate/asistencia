<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia NFC - Senshi-Kan</title>


<style>

/* ================================
   CONFIGURACIÓN GENERAL
================================ */

*{
    box-sizing:border-box;
}


body{

    margin:0;

    padding:0;

    height:100vh;

    background:#111;

    color:white;

    font-family:
    Arial,
    Helvetica,
    sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

}


/* ================================
   CONTENEDOR PRINCIPAL
================================ */

#app{

    width:100%;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}


/* ================================
   ENCABEZADO
================================ */

.titulo{

    font-size:45px;

    font-weight:bold;

    letter-spacing:3px;

    margin-bottom:10px;

}


.subtitulo{

    font-size:25px;

    color:#cccccc;

    margin-bottom:50px;

}


/* ================================
   ESTADO DEL LECTOR
================================ */

#estado{

    font-size:32px;

    font-weight:bold;

    margin-top:40px;

}


/* ================================
   NOMBRE DEL ALUMNO
================================ */

#nombreAlumno{

    display:none;

    margin-top:40px;

    font-size:65px;

    font-weight:bold;

    text-transform:uppercase;

}


/* ================================
   ICONO NFC
================================ */

.nfcIcon{

    font-size:100px;

    animation:pulse 2s infinite;

}


/* Animación */

@keyframes pulse{


    0%{

        transform:scale(1);

        opacity:1;

    }


    50%{

        transform:scale(1.15);

        opacity:.7;

    }


    100%{

        transform:scale(1);

        opacity:1;

    }


}


/* ================================
   COLORES DE MENSAJES
================================ */

.exito{

    color:#00ff66;

}


.error{

    color:#ff4444;

}


.espera{

    color:#ffcc00;

}


</style>


</head>
<body>


<div id="app">


    <div class="titulo">
        ACADEMIA SENSHI-KAN
    </div>


    <div class="subtitulo">
        Control de asistencia
    </div>



    <div class="nfcIcon">
        📲
    </div>



    <div id="estado" class="espera">

        Acerque su tarjeta NFC

    </div>



    <div id="nombreAlumno">

    </div>



</div>



<script>


/*
==================================================
CONFIGURACIÓN DEL SISTEMA
==================================================
*/


// URL del Web App de Google Apps Script

const URL_SCRIPT = 
"https://script.google.com/macros/s/AKfycbwX5w8iiwkJVbGtpz-5f20U9jue2MC0vouE3blkHXo9CIMqg9bvCZrAYE8WKxH4gXGWzg/exec";



// Control para evitar múltiples lecturas

let bloqueado=false;



// Referencias a elementos HTML

const estado =
document.getElementById("estado");


const nombreAlumno =
document.getElementById("nombreAlumno");



/*
==================================================
INICIO DEL SISTEMA
==================================================
*/


window.onload=function(){

    iniciarNFC();

};



/*
==================================================
LECTOR NFC
==================================================
*/


async function iniciarNFC(){


    // Verificar compatibilidad

    if(!("NDEFReader" in window)){


        estado.className="error";

        estado.innerHTML=
        "Este dispositivo no soporta NFC";


        return;


    }



    try{


        const ndef = new NDEFReader();



        await ndef.scan();



        estado.className="espera";

        estado.innerHTML=
        "📲 Acerque su tarjeta NFC";



        ndef.onreading = evento =>{


            leerTarjeta(evento);


        };



        ndef.onreadingerror = ()=>{


            estado.className="error";

            estado.innerHTML=
            "Error al leer tarjeta";


        };



    }


    catch(error){


        console.error(error);



        estado.className="error";


        estado.innerHTML=
        "Permiso NFC requerido";


    }


}





/*
==================================================
PROCESAR INFORMACIÓN DE LA TARJETA
==================================================
*/


function leerTarjeta(evento){



    // Evitar lecturas repetidas

    if(bloqueado){

        return;

    }



    bloqueado=true;



    let contenido="";



    const decoder =
    new TextDecoder();



    for(const record of evento.message.records){



        if(record.recordType==="text"){


            contenido =
            decoder.decode(record.data);


        }


    }



    console.log("ID recibido:",contenido);



    if(contenido!=""){


        procesarIDAlumno(contenido);


    }
    else{


        mostrarError(
        "Tarjeta sin información"
        );


    }



    // Esperar antes de aceptar otra tarjeta

    setTimeout(()=>{


        bloqueado=false;


        volverEsperando();



    },5000);



}






/*
==================================================
POR AHORA SOLO MOSTRAMOS EL ID RECIBIDO
==================================================
*/


/*
==================================================
ENVIAR ID AL APPS SCRIPT
==================================================
*/


async function procesarIDAlumno(id){


    estado.className="espera";


    estado.innerHTML=
    "🔎 Verificando alumno...";



    try{


        const respuesta =
        await fetch(
            URL_SCRIPT,
            {


                method:"POST",


                body:JSON.stringify({

                    accion:"registrarAsistencia",

                    idAlumno:id

                })

            }
        );



        const textoRespuesta = await respuesta.text();

console.log("Respuesta servidor:", textoRespuesta);

const datos = JSON.parse(textoRespuesta);



        console.log(datos);



        mostrarResultado(datos);



    }


    catch(error){


        console.error(error);



        mostrarError(
        "Error de conexión"
        );


    }


}

   /*
==================================================
MOSTRAR RESULTADO DEL SERVIDOR
==================================================
*/


function mostrarResultado(datos){



    nombreAlumno.style.display="block";



    if(datos.success){



        estado.className="exito";


        estado.innerHTML=
        "✅ ASISTENCIA REGISTRADA";



        nombreAlumno.innerHTML=
        datos.nombre;



        reproducirSonidoOK();



    }



    else if(datos.codigo==="DUPLICADO"){



        estado.className="error";


        estado.innerHTML=
        "⚠ YA REGISTRÓ ASISTENCIA";



        nombreAlumno.innerHTML=
        datos.nombre;



        reproducirSonidoError();



    }



    else{


        estado.className="error";


        estado.innerHTML=
        "❌ ALUMNO NO ENCONTRADO";



        nombreAlumno.innerHTML=
        "";



        reproducirSonidoError();


    }



}





function volverEsperando(){


    nombreAlumno.style.display="none";


    estado.className="espera";


    estado.innerHTML=
    "📲 Acerque su tarjeta NFC";


}





function mostrarError(texto){


    estado.className="error";


    estado.innerHTML=
    texto;


}

</script>


</body>

</html>
