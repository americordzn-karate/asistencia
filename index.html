<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia NFC - Senshi-Kan</title>


<style>

/* ================================
   CONFIGURACIÓN GENERAL
================================ */

*{
    box-sizing:border-box;
}


body{

    margin:0;

    padding:0;

    height:100vh;

    background:#111;

    color:white;

    font-family:
    Arial,
    Helvetica,
    sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

}


/* ================================
   CONTENEDOR PRINCIPAL
================================ */

#app{

    width:100%;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}


/* ================================
   ENCABEZADO
================================ */

.titulo{

    font-size:45px;

    font-weight:bold;

    letter-spacing:3px;

    margin-bottom:10px;

}


.subtitulo{

    font-size:25px;

    color:#cccccc;

    margin-bottom:50px;

}
   /* ================================
   LOGO
================================ */

.logo{

    width:120px;

    height:auto;

    margin-bottom:20px;

}


/* ================================
   ESTADO DEL LECTOR
================================ */

#estado{

    font-size:32px;

    font-weight:bold;

    margin-top:40px;

}


/* ================================
   NOMBRE DEL ALUMNO
================================ */

#nombreAlumno{

    display:none;

    margin-top:40px;

    font-size:65px;

    font-weight:bold;

    text-transform:uppercase;

}


/* ================================
   ICONO NFC
================================ */

.nfcIcon{

    font-size:100px;

    animation:pulse 2s infinite;

}


/* Animación */

@keyframes pulse{


    0%{

        transform:scale(1);

        opacity:1;

    }


    50%{

        transform:scale(1.15);

        opacity:.7;

    }


    100%{

        transform:scale(1);

        opacity:1;

    }


}


/* ================================
   COLORES DE MENSAJES
================================ */

.exito{

    color:#00ff66;

}


.error{

    color:#ff4444;

}


.espera{

    color:#ffcc00;

}


/* ================================
   ALERTA DE PAGO PENDIENTE
================================ */

#overlayPago{

    display:none;

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:#8b0000;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    z-index:999;

    padding:20px;

}

.pagoIcono{

    font-size:90px;

    margin-bottom:20px;

}

.pagoTitulo{

    font-size:55px;

    font-weight:bold;

    letter-spacing:2px;

    color:#ffffff;

    margin-bottom:20px;

}

.pagoNombre{

    font-size:38px;

    font-weight:bold;

    text-transform:uppercase;

    color:#ffffff;

    margin-bottom:50px;

}

#btnEnterado{

    font-size:28px;

    font-weight:bold;

    padding:18px 60px;

    border:none;

    border-radius:10px;

    background:#ffffff;

    color:#8b0000;

    cursor:pointer;

}

#btnEnterado:active{

    transform:scale(0.97);

}


</style>


</head>
<body>


<div id="app">


    <img
    src="https://raw.githubusercontent.com/americordzn-karate/asistencia/main/Escudo%20Circulo%20PNG.png"
    class="logo"
    alt="Academia Senshi-Kan">

<div class="titulo">
    ACADEMIA SENSHI-KAN
</div>


    <div class="subtitulo">
        Control de asistencia
    </div>



    <div class="nfcIcon">
        📲
    </div>



    <div id="estado" class="espera">

        Acerca tu tarjeta

    </div>



    <div id="nombreAlumno">

    </div>



</div>


<!-- ================================
     OVERLAY: ALERTA DE PAGO PENDIENTE
================================ -->

<div id="overlayPago">

    <div class="pagoIcono">⚠️</div>

    <div class="pagoTitulo">PAGO PENDIENTE</div>

    <div class="pagoNombre" id="nombrePagoPendiente"></div>

    <button id="btnEnterado" onclick="confirmarPagoPendiente()">ENTERADO</button>

</div>



<script>


/*
==================================================
CONFIGURACIÓN DEL SISTEMA
==================================================
*/


// URL del Web App de Google Apps Script

const URL_SCRIPT = 
"https://script.google.com/macros/s/AKfycbwX5w8iiwkJVbGtpz-5f20U9jue2MC0vouE3blkHXo9CIMqg9bvCZrAYE8WKxH4gXGWzg/exec";



// Control para evitar múltiples lecturas

const estado = document.getElementById("estado");
const nombreAlumno = document.getElementById("nombreAlumno");
const overlayPago = document.getElementById("overlayPago");
const nombrePagoPendiente = document.getElementById("nombrePagoPendiente");

let bloqueado = false;
let ndef = null;
let ultimoIdAlumno = null;



/*
==================================================
INICIO DEL SISTEMA
==================================================
*/


document.addEventListener("DOMContentLoaded", function () {

    
    iniciarNFC();

});
console.log("JavaScript cargado correctamente");


/*
==================================================
LECTOR NFC
==================================================
*/


async function iniciarNFC(){

    

    if(!("NDEFReader" in window)){

       

        estado.className="error";

        estado.innerHTML="Este dispositivo no soporta NFC";

        return;

    }

    

    try{

        

        ndef = new NDEFReader();

        

        await ndef.scan();

        
        estado.className="espera";

        estado.innerHTML="📲 Acerca tu tarjeta";

        ndef.onreading = (evento)=>{

            
            leerTarjeta(evento);

        };

    }
    catch(error){

       

        console.error(error);

    }

}





/*
==================================================
PROCESAR INFORMACIÓN DE LA TARJETA
==================================================
*/


function leerTarjeta(evento){



    // Evitar lecturas repetidas

    if(bloqueado){

        return;

    }



    bloqueado=true;



    let contenido="";



    const decoder =
    new TextDecoder();



    for(const record of evento.message.records){



        if(record.recordType==="text"){


            contenido =
            decoder.decode(record.data);


        }


    }



    console.log("ID recibido:",contenido);



    if(contenido!=""){


        procesarIDAlumno(contenido, false);


    }
    else{


        mostrarError(
        "Tarjeta sin información"
        );


        // Cooldown estándar antes de aceptar otra tarjeta

        programarDesbloqueo(5000);


    }



}






/*
==================================================
POR AHORA SOLO MOSTRAMOS EL ID RECIBIDO
==================================================
*/


/*
==================================================
ENVIAR ID AL APPS SCRIPT
==================================================
*/


async function procesarIDAlumno(id, confirmado){


    ultimoIdAlumno = id;


    estado.className="espera";


    estado.innerHTML=
    "🔎 Verificando alumno...";



    try{


        const respuesta = await fetch(URL_SCRIPT,{

    method:"POST",

    headers:{
        "Content-Type":"text/plain;charset=utf-8"
    },

    body:JSON.stringify({

        accion:"registrarAsistencia",

        idAlumno:id,

        confirmado:confirmado===true

    })

});
    
 

        const textoRespuesta = await respuesta.text();

console.log("Respuesta servidor:", textoRespuesta);

const datos = JSON.parse(textoRespuesta);



        console.log(datos);



        mostrarResultado(datos);



    }


    catch(error){

    console.error(error);

    estado.className="error";

    estado.innerHTML=error.message;

    nombreAlumno.style.display="block";

    nombreAlumno.innerHTML=error.stack || "";

    // Cooldown estándar antes de aceptar otra tarjeta

    programarDesbloqueo(5000);

}


}

   /*
==================================================
MOSTRAR RESULTADO DEL SERVIDOR
==================================================
*/


function mostrarResultado(datos){



    // --- CASO: PAGO PENDIENTE ---
    // El lector permanece bloqueado y no se registra asistencia
    // hasta que el usuario pulse el botón ENTERADO.

    if(!datos.success && datos.codigo==="PAGO_PENDIENTE"){

        mostrarAlertaPagoPendiente(datos.nombre);

        return;

    }



    nombreAlumno.style.display="block";



    if(datos.success){



        estado.className="exito";


        estado.innerHTML=
        "✅ ASISTENCIA REGISTRADA";



        nombreAlumno.innerHTML=
        datos.nombre;



       reproducirSonidoOK();



    }



    else if(datos.codigo==="DUPLICADO"){



        estado.className="error";


        estado.innerHTML=
        "⚠ YA REGISTRÓ ASISTENCIA";



        nombreAlumno.innerHTML=
        datos.nombre;



       reproducirSonidoError();



    }



    else{


        estado.className="error";


        estado.innerHTML=
        "❌ ALUMNO NO ENCONTRADO";



        nombreAlumno.innerHTML=
        "";



       reproducirSonidoError();


    }



    // Cooldown estándar de 5 segundos antes de aceptar otra tarjeta

    programarDesbloqueo(5000);



}



/*
==================================================
ALERTA DE PAGO PENDIENTE
==================================================
*/


function mostrarAlertaPagoPendiente(nombre){


    overlayPago.style.display="flex";


    nombrePagoPendiente.innerHTML = nombre || "";


    // Nota: "bloqueado" permanece en true. El lector NFC no
    // procesará nuevas tarjetas hasta que se pulse ENTERADO.


}


function confirmarPagoPendiente(){


    overlayPago.style.display="none";


    estado.className="espera";


    estado.innerHTML=
    "🔎 Verificando alumno...";


    // Se reenvía el mismo ID de alumno, ahora confirmado,
    // para registrar la asistencia y asignar los puntos.

    procesarIDAlumno(ultimoIdAlumno, true);


}



function volverEsperando(){


    nombreAlumno.style.display="none";


    estado.className="espera";


    estado.innerHTML=
    "📲 Acerca tu tarjeta";


}



function programarDesbloqueo(ms){


    setTimeout(()=>{


        bloqueado=false;


        volverEsperando();



    }, ms);


}





function mostrarError(texto){


    estado.className="error";


    estado.innerHTML=
    texto;


}
/*
==================================================
SONIDOS
==================================================
*/

function reproducirSonidoOK(){

    const audio = new (window.AudioContext || window.webkitAudioContext)();

    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audio.currentTime);
    osc.frequency.setValueAtTime(1175, audio.currentTime + 0.08);

    gain.gain.setValueAtTime(0.20, audio.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.25);

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.start();
    osc.stop(audio.currentTime + 0.25);

}



function reproducirSonidoError(){

    const audio = new (window.AudioContext || window.webkitAudioContext)();

    const osc = audio.createOscillator();
    const gain = audio.createGain();

    osc.type = "square";
    osc.frequency.setValueAtTime(250, audio.currentTime);

    gain.gain.setValueAtTime(0.20, audio.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.40);

    osc.connect(gain);
    gain.connect(audio.destination);

    osc.start();
    osc.stop(audio.currentTime + 0.40);

}
</script>


</body>

</html>
