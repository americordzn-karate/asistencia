<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector NFC</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#202124;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
    width:90%;
    max-width:400px;
}

input{
    width:100%;
    padding:15px;
    font-size:24px;
    text-align:center;
    margin-top:20px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
}

#estado{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Lector NFC</h1>

<input id="txtID" readonly placeholder="Esperando tarjeta">

<button id="btnIniciar">
Iniciar lector NFC
</button>

<div id="estado">
Esperando...
</div>

</div>

<script>

const txt=document.getElementById("txtID");
const estado=document.getElementById("estado");
const boton=document.getElementById("btnIniciar");

let ndef;

boton.addEventListener("click", iniciarNFC);

async function iniciarNFC(){

    try{

        ndef=new NDEFReader();

        await ndef.scan();

        boton.style.display="none";

        estado.innerHTML="📡 Acerque una tarjeta";

        ndef.onreading=leer;

        ndef.onreadingerror=function(){

            estado.innerHTML="Error de lectura";

        };

    }

    catch(e){

        estado.innerHTML=e.message;

        console.error(e);

    }

}

function leer(event){

    let texto="";

    const decoder=new TextDecoder();

    for(const record of event.message.records){

        if(record.recordType==="text"){

            texto=decoder.decode(record.data);

        }

    }

    txt.value=texto;

    estado.innerHTML="✅ RECIBIDO";

    beep();

    setTimeout(function(){

        estado.innerHTML="📡 Acerque otra tarjeta";

    },1500);

}

function beep(){

    const ctx=new AudioContext();

    const osc=ctx.createOscillator();

    const gain=ctx.createGain();

    osc.frequency.value=900;

    osc.connect(gain);

    gain.connect(ctx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.00001,
        ctx.currentTime+0.15
    );

    osc.stop(ctx.currentTime+0.15);

}

</script>

</body>
</html>
